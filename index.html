<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Reserva tus Vacaciones - Punta Cana</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body,html{height:100%;overflow-x:hidden;background:#000;color:#fff;transition:background 1s;}

/* Slider */
.slider{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-2;overflow:hidden;}
.slide{position:absolute;width:100%;height:100%;background-size:cover;background-position:center;opacity:0;transition:opacity 1.5s ease-in-out, transform 1.5s ease-in-out;}
.slide.active{opacity:1;transform:scale(1.05);}

/* Paquetes */
.packages{position:relative;z-index:10;padding:2rem;display:flex;flex-wrap:wrap;justify-content:center;gap:2rem;}
.package-card{
  position:relative;
  border-radius:20px;
  width:320px;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  overflow:hidden;
  cursor:pointer;
  transition:transform 0.3s,box-shadow 0.3s;
  height:420px;
  color:#fff;
}
.package-card:hover{transform:scale(1.03);box-shadow:0 10px 20px rgba(0,0,0,0.7);}

/* 🔥 AQUÍ ESTÁ EL CAMBIO (SIN CAPA NEGRA) */
.package-card::after{
  content:'';
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:transparent;
  z-index:0;
}

.package-card-content{position:relative;z-index:1;padding:1rem;}
.package-card h3{margin-bottom:0.5rem;font-size:1.3rem;text-shadow:1px 1px 6px rgba(0,0,0,0.8);}
.package-card p{font-size:1rem;margin-bottom:0.5rem;line-height:1.4;text-shadow:1px 1px 6px rgba(0,0,0,0.8);}
.package-card button{background:#25D366;color:#fff;border:none;padding:0.8rem 1.2rem;border-radius:12px;cursor:pointer;font-size:1rem;transition:transform 0.3s;margin-top:0.5rem;}
.package-card button:hover{transform:scale(1.05);}

/* WhatsApp flotante */
.whatsapp-btn{position:fixed;bottom:30px;right:30px;background:#25D366;width:70px;height:70px;border-radius:50%;display:flex;justify-content:center;align-items:center;font-size:35px;color:#fff;cursor:pointer;animation:pulse 1.5s infinite;z-index:20;}
@keyframes pulse{0%{transform:scale(1);}50%{transform:scale(1.15);}100%{transform:scale(1);}}

/* Modal */
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);display:none;justify-content:center;align-items:center;z-index:30;opacity:0;transition:opacity 0.5s;}
.modal.show{display:flex;opacity:1;}
.modal-content{background:rgba(0,0,0,0.95);padding:2rem;border-radius:20px;width:90%;max-width:700px;overflow-y:auto;max-height:90%;position:relative;transform:translateY(-20px);transition:transform 0.5s;}
.modal.show .modal-content{transform:translateY(0);}
.modal-content h2{text-align:center;margin-bottom:1rem;font-size:1.8rem;text-shadow:2px 2px 8px rgba(0,0,0,0.9);}
.modal-content img{width:100%;border-radius:15px;margin-bottom:1rem;}
.modal-content p{color:#fff;text-shadow:1px 1px 6px rgba(0,0,0,0.8);}
.form-group{margin-bottom:1rem;}
.form-group label{display:block;margin-bottom:0.3rem;font-weight:bold;color:#fff;text-shadow:1px 1px 6px rgba(0,0,0,0.8);}
.form-group input{width:100%;padding:0.5rem;border-radius:5px;border:none;}
#total{font-weight:bold;text-align:right;margin-top:1rem;font-size:1.2rem;text-shadow:1px 1px 6px rgba(0,0,0,0.8);}
.close-modal{position:absolute;top:20px;right:20px;font-size:30px;color:#fff;cursor:pointer;text-shadow:1px 1px 6px rgba(0,0,0,0.8);}
@media (max-width:768px){.packages{flex-direction:column;align-items:center;}}
</style>
</head>
<body>

<!-- Slider -->
<div class="slider" id="slider"></div>

<!-- Paquetes -->
<div class="packages" id="packages"></div>

<!-- Modal -->
<div class="modal" id="modalForm">
  <div class="modal-content">
    <span class="close-modal" onclick="cerrarModal()">&times;</span>
    <h2 id="modalTitle"></h2>
    <img id="modalImage" src="" alt="Hotel">
    <div id="modalInfo"></div>
    <h3>Reserva ahora</h3>
    <div class="form-group">
      <label for="cantidadPersonas">Cantidad de personas:</label>
      <input type="number" id="cantidadPersonas" min="1" max="10" value="1" onchange="generarPersonas()">
    </div>
    <form id="personasForm"></form>
    <div id="total">Total: $0</div>
    <button onclick="enviarWhatsApp()">Confirmar Reserva por WhatsApp</button>
  </div>
</div>

<div class="whatsapp-btn" onclick="abrirWhatsApp()">📲</div>

<script>
// Imágenes aleatorias
const hotelImages = [
'https://raw.githubusercontent.com/USDTexchange1/Reserva-tus-vacaciones-Punta-Cana/main/img/02e30307a9fc5fc64ab25d938913852.jpg',
'https://raw.githubusercontent.com/USDTexchange1/Reserva-tus-vacaciones-Punta-Cana/main/img/0c097571806a35a37a6d4a3fa76c7838.jpg',
'https://raw.githubusercontent.com/USDTexchange1/Reserva-tus-vacaciones-Punta-Cana/main/img/269cde62e854145941f391788ee69bc.jpg',
'https://raw.githubusercontent.com/USDTexchange1/Reserva-tus-vacaciones-Punta-Cana/main/img/2bff7940ffa503098fe8991445648741.jpg',
'https://raw.githubusercontent.com/USDTexchange1/Reserva-tus-vacaciones-Punta-Cana/main/img/47a566ba2b5be76fd463b4108d75b05d.jpg',
'https://raw.githubusercontent.com/USDTexchange1/Reserva-tus-vacaciones-Punta-Cana/main/img/487eafd9f3bce8cf7de9e4b3c2d36008.jpg',
'https://raw.githubusercontent.com/USDTexchange1/Reserva-tus-vacaciones-Punta-Cana/main/img/5223c72a3e17b1bdeaefeb52a6fdc2e8.jpg'
];

// Slider
const slider = document.getElementById('slider');
let sliderImages = hotelImages.sort(()=>0.5-Math.random());
sliderImages.forEach(url=>{
  let div = document.createElement('div');
  div.className='slide';
  div.style.backgroundImage=`url('${url}')`;
  slider.appendChild(div);
});
let slides=document.querySelectorAll('.slide');
slides[0].classList.add('active');
let current=0;
setInterval(()=>{
  slides[current].classList.remove('active');
  current=(current+1)%slides.length;
  slides[current].classList.add('active');
},5000);

// Paquetes
const packagesData = [
{name:'Paquete Aventura', hotel:'Barceló Bávaro Palace', duration:'7 días / 6 noches', price:3200, services:'Comidas, bebidas, transporte, excursiones a islas'},
{name:'Paquete Lujo', hotel:'Hard Rock Hotel', duration:'7 días / 6 noches', price:3800, services:'Comidas, bebidas premium, transporte privado, excursiones exclusivas'},
{name:'Paquete Cultural', hotel:'Iberostar Selection Bávaro', duration:'7 días / 6 noches', price:3400, services:'Comidas, bebidas, transporte, excursiones culturales y talleres locales'},
{name:'Paquete Explorador', hotel:'Majestic Colonial Punta Cana', duration:'10 días / 9 noches', price:4800, services:'Comidas, bebidas, transporte, excursiones a islas y tours por la ciudad'},
{name:'Paquete Ultra Lujo', hotel:'Secrets Royal Beach', duration:'10 días / 9 noches', price:5500, services:'Comidas, bebidas premium, transporte privado, excursiones VIP'},
{name:'Paquete Familiar', hotel:'Natura Park', duration:'7 días / 6 noches', price:3200, services:'Comidas, bebidas, transporte, excursiones familiares'},
{name:'Paquete Romance', hotel:'Excellence Punta Cana', duration:'7 días / 6 noches', price:3200, services:'Comidas, bebidas, transporte, actividades románticas'}
];

const packagesContainer = document.getElementById('packages');

packagesData.forEach(pkg=>{
  let img = hotelImages[Math.floor(Math.random()*hotelImages.length)];
  let div = document.createElement('div');
  div.className='package-card';
  div.style.backgroundImage=`url('${img}')`;

  div.innerHTML=`<div class="package-card-content">
    <h3>${pkg.name}</h3>
    <p>Hotel: ${pkg.hotel}</p>
    <p>${pkg.duration}</p>
    <p>Servicios: ${pkg.services}</p>
    <p>Precio por persona: $${pkg.price}</p>
    <button>Comprar / Reservar</button>
  </div>`;

  div.onclick=()=>abrirModal(pkg.name,pkg.hotel,img,pkg.price);
  packagesContainer.appendChild(div);
});

// Modal
let paqueteSeleccionado={nombre:'',hotel:'',imagen:'',precio:0};

function abrirModal(nombre,hotel,imagen,precio){
  paqueteSeleccionado={nombre,hotel,imagen,precio};
  document.getElementById('modalTitle').innerText=nombre+' - '+hotel;
  document.getElementById('modalImage').src=imagen;
  document.getElementById('modalInfo').innerHTML=`<p>Hotel: ${hotel}</p><p>Duración: ${precio>=4800?'10 días / 9 noches':'7 días / 6 noches'}</p><p>Precio por persona: $${precio}</p>`;
  document.getElementById('modalForm').classList.add('show');
  generarPersonas();
}

function cerrarModal(){
  document.getElementById('modalForm').classList.remove('show');
}

function generarPersonas(){
  const form=document.getElementById('personasForm');
  form.innerHTML='';
  const cantidad=parseInt(document.getElementById('cantidadPersonas').value);

  for(let i=1;i<=cantidad;i++){
    form.innerHTML+=`<div class="form-group">
      <label>Nombre Persona ${i}:</label>
      <input type="text" class="nombre">
      <label>Edad Persona ${i}:</label>
      <input type="number" class="edad" min="1">
    </div>`;
  }

  calcularTotal();
}

function calcularTotal(){
  const edades=document.querySelectorAll('.edad');
  let total=0;

  edades.forEach(e=>{
    const edad=parseInt(e.value)||0;
    total+=edad<18?paqueteSeleccionado.precio/2:paqueteSeleccionado.precio;
  });

  document.getElementById('total').innerText=`Total: $${total}`;
}

document.addEventListener('input',calcularTotal);

function enviarWhatsApp(){
  const nombres=document.querySelectorAll('.nombre');
  const edades=document.querySelectorAll('.edad');

  for(let i=0;i<nombres.length;i++){
    if(!nombres[i].value||!edades[i].value){
      alert("Completa todos los campos.");
      return;
    }
  }

  let mensaje=`Hola, quiero reservar el paquete: ${paqueteSeleccionado.nombre} - ${paqueteSeleccionado.hotel}\nCantidad de personas: ${nombres.length}\n`;
  let total=0;

  for(let i=0;i<nombres.length;i++){
    const edad=parseInt(edades[i].value);
    const precio=edad<18?paqueteSeleccionado.precio/2:paqueteSeleccionado.precio;
    total+=precio;

    mensaje+=`Persona ${i+1}: ${nombres[i].value}, Edad: ${edad}, Precio: $${precio}\n`;
  }

  mensaje+=`Total: $${total}`;
  const numero='5358752291';

  window.open(`https://wa.me/${numero}?text=${encodeURIComponent(mensaje)}`,'_blank');
}

function abrirWhatsApp(){
  const numero='5358752291';
  window.open(`https://wa.me/${numero}`,'_blank');
}
</script>

</body>
</html>
